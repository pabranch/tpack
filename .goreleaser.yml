version: 2

builds:
  - id: tpack
    main: ./cmd/tpack
    binary: tpack
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - freebsd
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: tpack
    ids:
      - tpack
    name_template: "tpack_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: tmuxpack
    name: tpack

homebrew_casks:
  - name: tpack
    homepage: https://github.com/tmuxpack/tpack
    description: Tmux Plugin Manager
    dependencies:
      - formula: tmux
      - formula: git
    repository:
      owner: tmuxpack
      name: homebrew-tpack
      token: "{{ .Env.GORELEASER_TOKEN }}"
    # tpack binaries are not signed/notarized, so strip the quarantine
    # attribute on install to avoid Gatekeeper blocking the binary.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/tpack"]
          end

nfpms:
  - id: tpack
    package_name: tpack
    homepage: https://github.com/tmuxpack/tpack
    description: Tmux Plugin Manager
    maintainer: tmuxpack <tmuxpack@users.noreply.github.com>
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    section: utils
    priority: optional
    dependencies:
      - tmux

  - id: tpack-termux
    package_name: tpack
    homepage: https://github.com/tmuxpack/tpack
    description: Tmux Plugin Manager (Termux)
    maintainer: tmuxpack <tmuxpack@users.noreply.github.com>
    license: MIT
    formats:
      - deb
    bindir: /data/data/com.termux/files/usr/bin
    section: utils
    priority: optional
    overrides:
      deb:
        file_name_template: "tpack_{{ .Version }}_termux_{{ .Arch }}"
